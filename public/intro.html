<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PURE RAGE</title>
    <link rel="stylesheet" href="../css/style.css" />
    <!-- Navbar css-->
    <link rel="stylesheet" href="../css/navbar.css" />
  </head>
  <body>
    <!-- Navbar -->
    {% include "navbar-before-login.html" %}
    <!-- PRESS START SCREEN -->
    <div id="intro-screen">
      <h1 class="intro-title glitchy">PURE RAGE</h1>
      <p id="press-start">PRESS START</p>
    </div>

    <!-- LOGIN FORM -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
          </div>
          <div class="modal-body">
            <div class="login-box hidden" id="login-box">
              <h1 class="title flicker">PURE RAGE</h1>
              <!-- Form here -->
              <form id="loginForm">
                <button type="button" id="signup-btn">NEW USER? SIGN UP!</button>

                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" class="form-control" required />

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" class="form-control" required />
                
                <button type="submit">LOGIN</button>
              </form>
              <p id="message"></p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Effects -->
    <div class="background-glow"></div>
    <div id="flame-container"></div>
    <div id="particle-container"></div>

    <!-- Audio -->
    <audio id="bg-music" autoplay loop>
      <source src="../assets/intro_music.mp3" type="audio/mpeg" />
    </audio>
    <img src="../assets/boss_face.png" alt="Boss Face" id="boss-face" />
    <button id="toggle-audio" class="audio-btn">🔊</button>

    <!-- JavaScript -->
    <script src="../js/script.js" defer></script>
    <script src="../js/signin.js" defer></script>
    <!-- Bootstrap -->
    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
      integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
