<div id="confirm-modal" class="hidden">
  <div class="confirm-box">
    <button id="popup-close">✖</button>
    <div class="confirm-layout">
      <!--  Left SIDE OF THE WINDOW: Character Image -->
      <div class="confirm-img-glow">
        <img id="popup-img" src="" alt="Character Portrait" />
      </div>

      <!--  Right SIDE OF THEN WINDOW : Info -->
      <div class="confirm-info">
        <h2 id="popup-name">Name</h2>
        <p id="popup-bio">Bio loads here...</p>

        <div class="stat">
          <label>HP:</label>
          <div class="bar"><div id="bar-hp"></div></div>
        </div>
        <div class="stat">
          <label>ATK:</label>
          <div class="bar"><div id="bar-atk"></div></div>
        </div>
        <div class="stat">
          <label>DEF:</label>
          <div class="bar"><div id="bar-def"></div></div>
        </div>
        <div class="stat">
          <label>M-ATK:</label>
          <div class="bar"><div id="bar-magic-power"></div></div>
        </div>
        <div class="stat">
          <label>M-DEF:</label>
          <div class="bar"><div id="bar-magic-resist"></div></div>
        </div>
      </div>
    </div>

    <!--  Centered Start Button -->
    <div class="popup-start-wrap">
      <button id="popup-start">🔥 START BATTLE 💀🔥</button>
    </div>
  </div>
</div>
